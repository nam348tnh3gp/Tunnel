name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT ANDROID NDK
      # ============================================================
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # ============================================================
      # BUILD CLOUDFLARED CHO TẤT CẢ KIẾN TRÚC
      # ============================================================
      - name: Build cloudflared for all architectures
        run: |
          git clone https://github.com/cloudflare/cloudflared.git --depth=1
          cd cloudflared
          mkdir -p ../output

          # Hàm build cho từng kiến trúc
          build_arch() {
            local arch=$1
            local clang_target=$2
            local goarch=$3
            export GOOS=android
            export GOARCH=$goarch
            export CGO_ENABLED=1
            export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$clang_target"
            export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${clang_target}++"
            go build -ldflags="-s -w" -o cloudflared ./cmd/cloudflared
            mv cloudflared ../output/cloudflared-$arch
          }

          build_arch arm64 aarch64-linux-android21-clang arm64
          build_arch arm32 armv7a-linux-androideabi21-clang arm
          build_arch x86_64 x86_64-linux-android21-clang amd64
          build_arch x86 i686-linux-android21-clang 386

          chmod +x ../output/*

      # ============================================================
      # TẠO FLUTTER PROJECT
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          cd tunnel_app
          rm -rf lib pubspec.yaml assets
          cp -r ../lib .
          cp ../pubspec.yaml .
          mkdir -p assets
          flutter pub get

      # ============================================================
      # COPY BINARY VÀO JNILIBS
      # ============================================================
      - name: Setup native libraries
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          mkdir -p android/app/src/main/jniLibs/x86

          cp ../output/cloudflared-arm64 android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          cp ../output/cloudflared-arm32 android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so
          cp ../output/cloudflared-x86_64 android/app/src/main/jniLibs/x86_64/libcloudflared.so
          cp ../output/cloudflared-x86 android/app/src/main/jniLibs/x86/libcloudflared.so

          chmod +x android/app/src/main/jniLibs/*/*.so
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          chmod +x assets/cloudflared

      # ============================================================
      # CẤU HÌNH ANDROID
      # ============================================================
      - name: Configure Android
        run: |
          cd tunnel_app

          # packagingOptions
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          # MainActivity.kt
          mkdir -p android/app/src/main/kotlin/com/yourcompany/tunnel_controller
          cat > android/app/src/main/kotlin/com/yourcompany/tunnel_controller/MainActivity.kt << 'EOF'
          package com.yourcompany.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.yourcompany.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          # AndroidManifest.xml
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourcompany.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <service
                      android:name="com.pravera.flutter_foreground_task.service.ForegroundService"
                      android:foregroundServiceType="dataSync" />
              </application>
          </manifest>
          EOF

      # ============================================================
      # BUILD APK
      # ============================================================
      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
