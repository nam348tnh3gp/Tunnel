name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT QEMU CHO ARM64
      # ============================================================
      - name: Setup QEMU for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm

      # ============================================================
      # CÀI ĐẶT ANDROID NDK
      # ============================================================
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # ============================================================
      # BUILD CLOUDFLARED CHO ANDROID
      # ============================================================
      - name: Build cloudflared for Android (ARM64)
        run: |
          git clone https://github.com/cloudflare/cloudflared.git --depth=1
          cd cloudflared
          export GOOS=android
          export GOARCH=arm64
          export CGO_ENABLED=1
          export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"
          go build -ldflags="-s -w" -o cloudflared ./cmd/cloudflared
          file cloudflared
          readelf -d cloudflared | grep NEEDED || echo "No dynamic dependencies"
          mkdir -p ../output
          cp cloudflared ../output/

      # ============================================================
      # TẠO FLUTTER PROJECT
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.TGNF --project-name tunnel_controller tunnel_app
          cd tunnel_app
          rm -rf lib pubspec.yaml assets
          cp -r ../lib .
          cp ../pubspec.yaml .
          mkdir -p assets
          flutter pub get

      # ============================================================
      # COPY CLOUDFLARED VÀO JNILIBS
      # ============================================================
      - name: Setup native libraries
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp ../output/cloudflared android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          wget -O android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so
          
          mkdir -p android/app/src/main/jniLibs/x86_64
          wget -O android/app/src/main/jniLibs/x86_64/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x android/app/src/main/jniLibs/x86_64/libcloudflared.so
          
          mkdir -p android/app/src/main/jniLibs/x86
          wget -O android/app/src/main/jniLibs/x86/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-386
          chmod +x android/app/src/main/jniLibs/x86/libcloudflared.so
          
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          chmod +x assets/cloudflared

      # ============================================================
      # CẤU HÌNH ANDROID
      # ============================================================
      - name: Configure Android
        run: |
          cd tunnel_app
          
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          mkdir -p android/app/src/main/kotlin/com/TGNF/tunnel_controller
          cat > android/app/src/main/kotlin/com/TGNF/tunnel_controller/MainActivity.kt << 'EOF'
          package com.TGNF.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.TGNF.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.TGNF.tunnel_controller">
              <!-- Chỉ giữ các quyền cần thiết -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      # ============================================================
      # BUILD APK
      # ============================================================
      - name: Build APK (full architecture)
        run: |
          cd tunnel_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
