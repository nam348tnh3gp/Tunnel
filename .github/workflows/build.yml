name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT CÔNG CỤ
      # ============================================================
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf binutils

      # ============================================================
      # TẢI PROOT VÀ GIẢI NÉN
      # ============================================================
      - name: Download proot deb
        run: |
          wget -O proot.deb \
            https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.85_aarch64.deb
          ar x proot.deb
          tar -xvf data.tar.xz
          mkdir -p output
          cp data/data/com.termux/files/usr/bin/proot output/
          cp data/data/com.termux/files/usr/libexec/proot/loader output/loader.elf

      # ============================================================
      # PHÁT HIỆN THƯ VIỆN PHỤ THUỘC (chỉ để tham khảo)
      # ============================================================
      - name: Find dependencies
        run: |
          echo "=== Dependencies of proot ==="
          readelf -d output/proot | grep NEEDED

      # ============================================================
      # TẢI CÁC GÓI THƯ VIỆN (link chính thức từ packages.termux.dev)
      # ============================================================
      - name: Download dependency packages
        run: |
          mkdir -p libs_output
          
          # Tải libtalloc (phiên bản 2.4.3)
          wget -O libtalloc.deb \
            https://packages.termux.dev/apt/termux-main/pool/main/libt/libtalloc/libtalloc_2.4.3_aarch64.deb
          
          # Tải libandroid-shmem (phiên bản 0.7 - đã xác nhận tồn tại)
          wget -O libandroid-shmem.deb \
            https://packages.termux.dev/apt/termux-main/pool/main/liba/libandroid-shmem/libandroid-shmem_0.7_aarch64.deb
          
          # Giải nén tất cả .deb
          for deb in *.deb; do
            ar x $deb
            tar -xvf data.tar.xz
          done
          
          # Tìm tất cả .so và copy vào libs_output
          find data -name "*.so*" -exec cp {} libs_output/ \;
          
          echo "=== Libraries collected ==="
          ls -la libs_output/

      # ============================================================
      # SỬA TÊN FILE .so (bỏ số phiên bản) VÀ SỬA NEEDED CỦA PROOT
      # ============================================================
      - name: Fix library names and proot dependencies
        run: |
          # Đổi tên .so.2, .so.0 -> .so
          for lib in libs_output/*.so*; do
            if [[ $lib == *.so.* ]]; then
              newname=$(echo $lib | sed 's/\.[0-9]*$//')
              mv $lib $newname
            fi
          done
          
          # Copy các .so vào output
          cp libs_output/*.so output/ 2>/dev/null || true
          
          # Sửa NEEDED của proot
          cd output
          # Thay libtalloc.so.2 -> libtalloc.so
          if readelf -d proot | grep -q "libtalloc.so.2"; then
            patchelf --replace-needed libtalloc.so.2 libtalloc.so proot
          fi
          # libandroid-shmem.so đã đúng tên, không cần sửa
          echo "=== Fixed proot dependencies ==="
          readelf -d proot | grep NEEDED
          ls -la

      # ============================================================
      # TẠO FLUTTER PROJECT & ĐÓNG GÓI
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          rm -rf tunnel_app/lib tunnel_app/pubspec.yaml tunnel_app/assets
          cp -r lib tunnel_app/
          cp pubspec.yaml tunnel_app/
          mkdir -p tunnel_app/assets
          cd tunnel_app
          flutter pub get

      - name: Package binaries into APK
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          
          # Proot và loader
          cp ../output/proot android/app/src/main/jniLibs/arm64-v8a/libproot.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot.so
          cp ../output/loader.elf android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so
          
          # Tất cả thư viện phụ thuộc
          cp ../output/*.so android/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          chmod +x android/app/src/main/jniLibs/arm64-v8a/*.so 2>/dev/null || true

      - name: Download cloudflared binary
        run: |
          cd tunnel_app
          wget -O android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so

      - name: Configure Android
        run: |
          cd tunnel_app
          
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          mkdir -p android/app/src/main/kotlin/com/yourcompany/tunnel_controller
          cat > android/app/src/main/kotlin/com/yourcompany/tunnel_controller/MainActivity.kt << 'EOF'
          package com.yourcompany.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.yourcompany.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourcompany.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # Fallback assets
          cp android/app/src/main/jniLibs/arm64-v8a/* assets/ 2>/dev/null || true
          chmod +x assets/* 2>/dev/null || true

      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
