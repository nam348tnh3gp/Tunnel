name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # BUILD PROOT TRONG DOCKER TERMUX (môi trường chính xác)
      # ============================================================
      
      - name: Build proot and loader using Termux Docker
        run: |
          # Tạo script build bên trong container
          cat > build-proot.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "=== Installing build dependencies ==="
          pkg update -y
          pkg install -y binutils make gcc libtalloc-dev uthash-dev libarchive-dev git
          
          echo "=== Cloning Termux proot source ==="
          git clone https://github.com/termux/proot.git
          cd proot/src
          
          echo "=== Building proot and loader ==="
          # Build config
          make build.h
          
          # Build loader (Termux tự động xử lý cả 32 và 64-bit)
          make loader.elf loader-m32.elf
          
          # Build proot binary
          make proot
          
          echo "=== Build completed ==="
          ls -la proot loader.elf loader-m32.elf
          
          # Copy ra ngoài
          cp proot /output/
          cp loader.elf /output/
          cp loader-m32.elf /output/ 2>/dev/null || true
          EOF
          
          chmod +x build-proot.sh
          
          # Tạo thư mục output
          mkdir -p output
          
          # Chạy Docker Termux và mount volume
          docker run --rm \
            -v $(pwd):/workspace \
            -v $(pwd)/output:/output \
            -w /workspace \
            termux/termux-docker \
            /bin/bash -c "/workspace/build-proot.sh"
          
          # Kiểm tra output
          echo "=== Output files ==="
          ls -la output/

      # ============================================================
      # TẠO FLUTTER PROJECT & ĐÓNG GÓI
      # ============================================================

      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          rm -rf tunnel_app/lib tunnel_app/pubspec.yaml tunnel_app/assets
          cp -r lib tunnel_app/
          cp pubspec.yaml tunnel_app/
          mkdir -p tunnel_app/assets
          cd tunnel_app
          flutter pub get

      - name: Package proot and loader into APK
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          
          # Proot binary
          cp ../output/proot android/app/src/main/jniLibs/arm64-v8a/libproot.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot.so
          
          # Proot loader (64-bit)
          cp ../output/loader.elf android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so

      - name: Download cloudflared binary
        run: |
          cd tunnel_app
          wget -O android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so

      # ============================================================
      # CẤU HÌNH ANDROID
      # ============================================================

      - name: Configure Android
        run: |
          cd tunnel_app
          
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          mkdir -p android/app/src/main/kotlin/com/yourcompany/tunnel_controller
          cat > android/app/src/main/kotlin/com/yourcompany/tunnel_controller/MainActivity.kt << 'EOF'
          package com.yourcompany.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.yourcompany.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourcompany.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # Fallback assets
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          cp android/app/src/main/jniLibs/arm64-v8a/libproot.so assets/proot
          cp android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so assets/proot_loader
          chmod +x assets/cloudflared
          chmod +x assets/proot
          chmod +x assets/proot_loader

      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
