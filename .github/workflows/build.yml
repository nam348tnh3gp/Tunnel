name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT CÔNG CỤ
      # ============================================================
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf binutils

      # ============================================================
      # TẢI PROOT VÀ GIẢI NÉN
      # ============================================================
      - name: Download proot deb
        run: |
          wget -O proot.deb \
            https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.1.107.85_aarch64.deb
          ar x proot.deb
          tar -xvf data.tar.xz
          mkdir -p output
          cp data/data/com.termux/files/usr/bin/proot output/
          cp data/data/com.termux/files/usr/libexec/proot/loader output/loader.elf

      # ============================================================
      # PHÁT HIỆN THƯ VIỆN PHỤ THUỘC CỦA PROOT
      # ============================================================
      - name: Find dependencies
        run: |
          echo "=== Dependencies of proot ==="
          readelf -d output/proot | grep NEEDED
          # Lấy danh sách tên thư viện (loại bỏ [])
          readelf -d output/proot | grep NEEDED | awk -F'[][]' '{print $2}' > deps.txt
          cat deps.txt
          # Chuyển tên thư viện sang tên gói Termux (map thủ công)
          # libtalloc.so.2 -> libtalloc
          # libandroid-shmem.so.0 -> libandroid-shmem
          # libandroid-glob.so.0 -> libandroid-glob
          # Nếu có thêm, bổ sung
          cat deps.txt | sed 's/\.so\.[0-9]*//g' | sed 's/^lib//g' > pkg_names.txt
          echo "=== Package names ==="
          cat pkg_names.txt

      # ============================================================
      # TẢI CÁC GÓI THƯ VIỆN TỪ TERMUX
      # ============================================================
      - name: Download dependency packages
        run: |
          mkdir -p libs_output
          # Map các thư viện cần thiết (dựa trên kinh nghiệm)
          # Termux package naming: lib<name> (ví dụ libtalloc, libandroid-shmem)
          for pkg in talloc android-shmem android-glob; do
            echo "Downloading lib$pkg..."
            # Tìm phiên bản mới nhất từ repo (dùng wget thử các phiên bản)
            # Cách đơn giản: thử tải từ link cố định phiên bản gần đây
            wget -O lib$pkg.deb \
              https://mirror.bouwhuis.network/termux/apt/apt/termux-main/pool/main/lib$pkg/lib$pkg/lib$pkg_*.aarch64.deb 2>/dev/null || \
            wget -O lib$pkg.deb \
              https://packages.termux.dev/apt/termux-main/pool/main/lib$pkg/lib$pkg/lib$pkg_*.aarch64.deb 2>/dev/null || true
            if [ -f lib$pkg.deb ]; then
              ar x lib$pkg.deb
              tar -xvf data.tar.xz
              # Tìm file .so và copy vào libs_output
              find data -name "*.so*" -exec cp {} libs_output/ \;
            else
              echo "lib$pkg not found, skipping..."
            fi
          done
          echo "=== Libraries collected ==="
          ls -la libs_output/

      # ============================================================
      # SỬA TÊN FILE .so CHO PHÙ HỢP VỚI ANDROID
      # ============================================================
      - name: Fix library names and dependencies
        run: |
          # Đổi tên các file .so.2 hoặc .so.0 thành .so
          for lib in libs_output/*.so*; do
            if [[ $lib == *.so.* ]]; then
              newname=$(echo $lib | sed 's/\.[0-9]*$//')
              mv $lib $newname
            fi
          done
          # Copy vào output cùng với proot và loader
          cp libs_output/*.so output/ 2>/dev/null || true
          # Sửa NEEDED của proot: từ .so.2 -> .so
          cd output
          # Lấy danh sách NEEDED hiện tại
          needed=$(readelf -d proot | grep NEEDED | awk -F'[][]' '{print $2}')
          for lib in $needed; do
            # Nếu lib chứa .so. số, thay bằng .so
            newlib=$(echo $lib | sed 's/\.[0-9]*$//')
            if [ "$lib" != "$newlib" ]; then
              echo "Replacing $lib with $newlib"
              patchelf --replace-needed $lib $newlib proot
            fi
          done
          echo "=== Fixed proot dependencies ==="
          readelf -d proot | grep NEEDED
          ls -la

      # ============================================================
      # TẠO FLUTTER PROJECT & ĐÓNG GÓI
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          rm -rf tunnel_app/lib tunnel_app/pubspec.yaml tunnel_app/assets
          cp -r lib tunnel_app/
          cp pubspec.yaml tunnel_app/
          mkdir -p tunnel_app/assets
          cd tunnel_app
          flutter pub get

      - name: Package binaries into APK
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          
          # Proot và loader
          cp ../output/proot android/app/src/main/jniLibs/arm64-v8a/libproot.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot.so
          cp ../output/loader.elf android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so
          
          # Tất cả thư viện phụ thuộc
          cp ../output/*.so android/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          chmod +x android/app/src/main/jniLibs/arm64-v8a/*.so 2>/dev/null || true

      - name: Download cloudflared binary
        run: |
          cd tunnel_app
          wget -O android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so

      - name: Configure Android
        run: |
          cd tunnel_app
          
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          mkdir -p android/app/src/main/kotlin/com/yourcompany/tunnel_controller
          cat > android/app/src/main/kotlin/com/yourcompany/tunnel_controller/MainActivity.kt << 'EOF'
          package com.yourcompany.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.yourcompany.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourcompany.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # Fallback assets
          cp android/app/src/main/jniLibs/arm64-v8a/* assets/ 2>/dev/null || true
          chmod +x assets/* 2>/dev/null || true

      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
