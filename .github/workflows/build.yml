name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT ANDROID NDK
      # ============================================================
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # ============================================================
      # BUILD CLOUDFLARED CHO TẤT CẢ KIẾN TRÚC
      # ============================================================
      - name: Build cloudflared for all architectures
        run: |
          git clone https://github.com/cloudflare/cloudflared.git --depth=1
          cd cloudflared
          mkdir -p ../output

          build_arch() {
            local arch=$1
            local clang_target=$2
            local goarch=$3
            export GOOS=android
            export GOARCH=$goarch
            export CGO_ENABLED=1
            export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$clang_target"
            export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${clang_target}++"
            go build -ldflags="-s -w" -o cloudflared ./cmd/cloudflared
            mv cloudflared ../output/cloudflared-$arch
          }

          build_arch arm64 aarch64-linux-android21-clang arm64
          build_arch arm32 armv7a-linux-androideabi21-clang arm
          build_arch x86_64 x86_64-linux-android21-clang amd64
          build_arch x86 i686-linux-android21-clang 386

          chmod +x ../output/*

      # ============================================================
      # TẠO FLUTTER PROJECT VỚI minSdkVersion=21
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.TGFN --project-name tunnel_controller tunnel_app
          cd tunnel_app
          rm -rf lib pubspec.yaml assets
          cp -r ../lib .
          cp ../pubspec.yaml .
          mkdir -p assets
          flutter pub get

      # ============================================================
      # CẤU HÌNH GRADLE (minSdkVersion, Kotlin, build.gradle)
      # ============================================================
      - name: Configure Gradle for foreground service
        run: |
          cd tunnel_app

          # 👇 Cập nhật minSdkVersion lên 21 và targetSdkVersion 34
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' android/app/build.gradle

          # 👇 Thêm packagingOptions
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          # 👇 Cập nhật Kotlin version cho foreground service
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.10"/g' android/build.gradle

          # 👇 Cập nhật Gradle version
          sed -i 's/distributionUrl=.*/distributionUrl=https\\:\\/\\/services.gradle.org\\/distributions\\/gradle-8.6-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties

      # ============================================================
      # COPY BINARY VÀO JNILIBS
      # ============================================================
      - name: Setup native libraries
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          mkdir -p android/app/src/main/jniLibs/x86

          cp ../output/cloudflared-arm64 android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          cp ../output/cloudflared-arm32 android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so
          cp ../output/cloudflared-x86_64 android/app/src/main/jniLibs/x86_64/libcloudflared.so
          cp ../output/cloudflared-x86 android/app/src/main/jniLibs/x86/libcloudflared.so

          chmod +x android/app/src/main/jniLibs/*/*.so
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          chmod +x assets/cloudflared

      # ============================================================
      # CẤU HÌNH ANDROID (MainActivity, Manifest, Kotlin)
      # ============================================================
      - name: Configure Android
        run: |
          cd tunnel_app

          # MainActivity.kt
          mkdir -p android/app/src/main/kotlin/com/TGFN/tunnel_controller
          cat > android/app/src/main/kotlin/com/TGFN/tunnel_controller/MainActivity.kt << 'EOF'
          package com.TGFN.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.TGFN.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          # AndroidManifest.xml (full quyền foreground service)
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.TGFN.tunnel_controller">
              <!-- Quyền Internet -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <!-- Quyền Foreground Service (Android 14+) -->
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />

              <!-- Quyền Notification (Android 13+) -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <!-- Quyền khởi động cùng hệ thống -->
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

                  <!-- 👇 Foreground Service (bắt buộc cho flutter_foreground_task) -->
                  <service
                      android:name="com.pravera.flutter_foreground_task.service.ForegroundService"
                      android:foregroundServiceType="dataSync"
                      android:exported="false"
                      android:stopWithTask="true" />
              </application>
          </manifest>
          EOF

          # 👇 Tạo file màu sắc (style) để tránh lỗi build
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">?android:colorBackground</item>
              </style>
          </resources>
          EOF

          # 👇 Tạo file drawable launch_background
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/black" />
          </layer-list>
          EOF

          # 👇 Tạo file drawable-v21 cho Android 5.0+
          mkdir -p android/app/src/main/res/drawable-v21
          cat > android/app/src/main/res/drawable-v21/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="?android:colorBackground" />
          </layer-list>
          EOF

      # ============================================================
      # BUILD APK
      # ============================================================
      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
