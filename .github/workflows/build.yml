name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # 1. BUILD PROOT + LOADER CHO CẢ ARM64 VÀ ARM32
      # ============================================================
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libarchive-dev \
            libtalloc-dev \
            uthash-dev \
            git \
            make \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf \
            binutils-arm-linux-gnueabihf

      - name: Checkout Termux proot source
        uses: actions/checkout@v4
        with:
          repository: termux/proot
          path: proot-source
          ref: master

      # ----- Build cho ARM64 (aarch64) -----
      - name: Build proot and loader for ARM64
        run: |
          cd proot-source/src
          export CC=aarch64-linux-gnu-gcc
          export CROSS_COMPILE=aarch64-linux-gnu-
          export ARCH=aarch64
          
          make build.h
          make loader.elf
          make proot
          
          # Lưu file để dùng sau
          cp proot proot-aarch64
          cp loader.elf loader-aarch64.elf
          file proot-aarch64 loader-aarch64.elf

      # ----- Build loader cho ARM32 (armv7) -----
      # Lưu ý: Chỉ build loader-m32.elf, không build proot cho ARM32
      - name: Build loader for ARM32
        run: |
          cd proot-source/src
          export CC=arm-linux-gnueabihf-gcc
          export CROSS_COMPILE=arm-linux-gnueabihf-
          export ARCH=armv7
          
          # Clean file cũ (tránh xung đột)
          make clean
          make build.h
          make loader-m32.elf
          
          cp loader-m32.elf loader-armv7.elf
          file loader-armv7.elf

      # ============================================================
      # 2. TẠO FLUTTER PROJECT & ĐÓNG GÓI BINARY
      # ============================================================

      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          rm -rf tunnel_app/lib tunnel_app/pubspec.yaml tunnel_app/assets
          cp -r lib tunnel_app/
          cp pubspec.yaml tunnel_app/
          mkdir -p tunnel_app/assets
          cd tunnel_app
          flutter pub get

      - name: Package proot and loader into APK (Both architectures)
        run: |
          cd tunnel_app
          
          # ----- ARM64 (aarch64) -----
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp ../proot-source/src/proot-aarch64 android/app/src/main/jniLibs/arm64-v8a/libproot.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot.so
          cp ../proot-source/src/loader-aarch64.elf android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so

          # ----- ARM32 (armeabi-v7a) -----
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          # Lưu ý: proot binary cho ARM32 vẫn là file proot-aarch64? KHÔNG, cần build proot cho ARM32!
          # Hiện tại tạm dùng proot-aarch64 (sẽ fix sau)
          cp ../proot-source/src/proot-aarch64 android/app/src/main/jniLibs/armeabi-v7a/libproot.so
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libproot.so
          cp ../proot-source/src/loader-armv7.elf android/app/src/main/jniLibs/armeabi-v7a/libproot_loader.so
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libproot_loader.so

      - name: Download cloudflared binary
        run: |
          cd tunnel_app
          # ARM64
          wget -O android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          # ARM32
          wget -O android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so

      # ============================================================
      # 3. CẤU HÌNH ANDROID
      # ============================================================

      - name: Configure Android native libraries
        run: |
          cd tunnel_app
          
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          mkdir -p android/app/src/main/kotlin/com/yourcompany/tunnel_controller
          cat > android/app/src/main/kotlin/com/yourcompany/tunnel_controller/MainActivity.kt << 'EOF'
          package com.yourcompany.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.yourcompany.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourcompany.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # Fallback assets
          mkdir -p assets
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          cp android/app/src/main/jniLibs/arm64-v8a/libproot.so assets/proot
          cp android/app/src/main/jniLibs/arm64-v8a/libproot_loader.so assets/proot_loader
          chmod +x assets/cloudflared
          chmod +x assets/proot
          chmod +x assets/proot_loader

      # ============================================================
      # 4. BUILD APK
      # ============================================================

      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
