name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # Tạo project Flutter mới (có cấu hình Gradle mới nhất)
      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          # Xóa các file mặc định
          rm -rf tunnel_app/lib tunnel_app/pubspec.yaml tunnel_app/assets
          # Copy code và assets từ thư mục gốc vào
          cp -r lib tunnel_app/
          cp pubspec.yaml tunnel_app/
          cp -r assets tunnel_app/ 2>/dev/null || mkdir -p tunnel_app/assets
          cd tunnel_app
          flutter pub get

      # Tải binary cloudflared và đặt vào assets
      - name: Download cloudflared binary
        run: |
          wget -O tunnel_app/assets/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x tunnel_app/assets/cloudflared

      # Build APK
      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release --split-per-abi

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
