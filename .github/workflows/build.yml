name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT ANDROID NDK
      # ============================================================
      - name: Setup Android NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # ============================================================
      # BUILD CLOUDFLARED CHO TẤT CẢ KIẾN TRÚC
      # ============================================================
      - name: Build cloudflared for all architectures
        run: |
          git clone https://github.com/cloudflare/cloudflared.git --depth=1
          cd cloudflared
          mkdir -p ../output

          build_arch() {
            local arch=$1
            local clang_target=$2
            local goarch=$3
            export GOOS=android
            export GOARCH=$goarch
            export CGO_ENABLED=1
            export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$clang_target"
            export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${clang_target}++"
            go build -ldflags="-s -w" -o cloudflared ./cmd/cloudflared
            mv cloudflared ../output/cloudflared-$arch
          }

          build_arch arm64 aarch64-linux-android21-clang arm64
          build_arch arm32 armv7a-linux-androideabi21-clang arm
          build_arch x86_64 x86_64-linux-android21-clang amd64
          build_arch x86 i686-linux-android21-clang 386

          chmod +x ../output/*

      # ============================================================
      # TẠO FLUTTER PROJECT (CÓ CHỈ ĐỊNH PLATFORM ANDROID)
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.TGFN --project-name tunnel_controller --platforms=android tunnel_app
          cd tunnel_app
          # Xóa lib, pubspec.yaml, assets để thay bằng code của bạn
          rm -rf lib pubspec.yaml assets
          cp -r ../lib .
          cp ../pubspec.yaml .
          mkdir -p assets
          flutter pub get

      # ============================================================
      # CẤU HÌNH GRADLE (HỖ TRỢ CẢ .gradle VÀ .gradle.kts)
      # ============================================================
      - name: Configure Gradle
        run: |
          cd tunnel_app
          
          echo "📁 Kiểm tra cấu trúc thư mục android..."
          find android -type f -name "*.gradle*" | head -20
          
          # Tìm file build.gradle hoặc build.gradle.kts
          if [ -f "android/app/build.gradle" ]; then
            GRADLE_FILE="android/app/build.gradle"
            echo "✅ Tìm thấy build.gradle"
          elif [ -f "android/app/build.gradle.kts" ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
            echo "✅ Tìm thấy build.gradle.kts"
          else
            echo "❌ Không tìm thấy file build.gradle nào!"
            echo "📁 Cấu trúc android/app:"
            ls -la android/app/ || true
            echo "📁 Toàn bộ android:"
            find android -type f | head -30
            exit 1
          fi
          
          echo "📝 Đang sửa file: $GRADLE_FILE"
          
          # Backup file gốc
          cp "$GRADLE_FILE" "$GRADLE_FILE.bak"
          
          # Cập nhật minSdkVersion, targetSdkVersion, compileSdkVersion
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' "$GRADLE_FILE"
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' "$GRADLE_FILE"
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' "$GRADLE_FILE"
          
          # Thêm packagingOptions nếu chưa có
          if ! grep -q "packagingOptions" "$GRADLE_FILE"; then
            sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' "$GRADLE_FILE"
          fi
          
          # Sửa Kotlin version (nếu có file build.gradle ở root)
          if [ -f "android/build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.10"/g' android/build.gradle
            echo "✅ Đã sửa kotlin_version"
          fi
          
          # Sửa Gradle version
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's/distributionUrl=.*/distributionUrl=https\\:\\/\\/services.gradle.org\\/distributions\\/gradle-8.6-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties
            echo "✅ Đã sửa gradle-wrapper.properties"
          fi
          
          echo "✅ Cấu hình Gradle hoàn tất"

      # ============================================================
      # COPY BINARY VÀO JNILIBS
      # ============================================================
      - name: Setup native libraries
        run: |
          cd tunnel_app
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          mkdir -p android/app/src/main/jniLibs/x86

          # Copy binaries với kiểm tra file tồn tại
          if [ -f "../output/cloudflared-arm64" ]; then
            cp ../output/cloudflared-arm64 android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
            echo "✅ Copied arm64"
          else
            echo "⚠️ Không tìm thấy cloudflared-arm64"
          fi
          
          if [ -f "../output/cloudflared-arm32" ]; then
            cp ../output/cloudflared-arm32 android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so
            echo "✅ Copied arm32"
          else
            echo "⚠️ Không tìm thấy cloudflared-arm32"
          fi
          
          if [ -f "../output/cloudflared-x86_64" ]; then
            cp ../output/cloudflared-x86_64 android/app/src/main/jniLibs/x86_64/libcloudflared.so
            echo "✅ Copied x86_64"
          else
            echo "⚠️ Không tìm thấy cloudflared-x86_64"
          fi
          
          if [ -f "../output/cloudflared-x86" ]; then
            cp ../output/cloudflared-x86 android/app/src/main/jniLibs/x86/libcloudflared.so
            echo "✅ Copied x86"
          else
            echo "⚠️ Không tìm thấy cloudflared-x86"
          fi

          # Set permissions
          chmod +x android/app/src/main/jniLibs/*/*.so 2>/dev/null || true
          
          # Copy binary to assets
          if [ -f "android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so" ]; then
            cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
            chmod +x assets/cloudflared
            echo "✅ Copied cloudflared to assets"
          fi

      # ============================================================
      # CẤU HÌNH ANDROID (MainActivity, Manifest)
      # ============================================================
      - name: Configure Android
        run: |
          cd tunnel_app

          # MainActivity.kt
          mkdir -p android/app/src/main/kotlin/com/TGFN/tunnel_controller
          cat > android/app/src/main/kotlin/com/TGFN/tunnel_controller/MainActivity.kt << 'EOF'
          package com.TGFN.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.TGFN.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF
          echo "✅ Created MainActivity.kt"

          # AndroidManifest.xml
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.TGFN.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />

              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

                  <service
                      android:name="com.pravera.flutter_foreground_task.service.ForegroundService"
                      android:foregroundServiceType="dataSync"
                      android:exported="false"
                      android:stopWithTask="true" />
              </application>
          </manifest>
          EOF
          echo "✅ Created AndroidManifest.xml"

          # Styles
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">?android:colorBackground</item>
              </style>
          </resources>
          EOF

          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/black" />
          </layer-list>
          EOF

          mkdir -p android/app/src/main/res/drawable-v21
          cat > android/app/src/main/res/drawable-v21/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="?android:colorBackground" />
          </layer-list>
          EOF
          
          echo "✅ Configured Android resources"

      # ============================================================
      # BUILD APK
      # ============================================================
      - name: Build APK
        run: |
          cd tunnel_app
          flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
