name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # BUILD CLOUDFLARED CHO ANDROID (CROSS-COMPILE)
      # ============================================================
      
      - name: Install Go and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go git make

      - name: Build cloudflared for Android (ARM64)
        run: |
          # Cài Go nếu chưa có
          if ! command -v go &> /dev/null; then
            wget https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
            sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
            export PATH=$PATH:/usr/local/go/bin
          fi
          export PATH=$PATH:/usr/local/go/bin
          
          # Clone cloudflared
          git clone https://github.com/cloudflare/cloudflared.git --depth=1
          cd cloudflared
          
          # Build cho Android ARM64 với dynamic linking (sẽ dùng DNS của Android)
          # Lưu ý: Cần cross-compile với Android NDK toolchain
          # Dùng GOOS=android và GOARCH=arm64 với CGO_ENABLED=1
          # Nhưng trên AMD64 không có linker cho Android, nên dùng CGO_ENABLED=0
          # và thêm flag để sử dụng DNS của Android
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build \
            -ldflags="-s -w -X main.Version=$(git describe --tags --always)" \
            -o cloudflared-arm64 ./cmd/cloudflared
          
          # Kiểm tra
          file cloudflared-arm64
          ls -la cloudflared-arm64
          
          # Copy ra output
          mkdir -p ../output
          cp cloudflared-arm64 ../output/cloudflared

      # ============================================================
      # TẠO FLUTTER PROJECT
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.yourcompany --project-name tunnel_controller tunnel_app
          cd tunnel_app
          rm -rf lib pubspec.yaml assets
          cp -r ../lib .
          cp ../pubspec.yaml .
          mkdir -p assets
          flutter pub get

      # ============================================================
      # COPY CLOUDFLARED VÀO JNILIBS (CHO TẤT CẢ KIẾN TRÚC)
      # ============================================================
      - name: Setup native libraries for all architectures
        run: |
          cd tunnel_app
          
          # ARM64-v8a (build từ source)
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp ../output/cloudflared android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so
          
          # armabi-v7a (ARM32) - dùng binary từ Cloudflare
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          wget -O android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm
          chmod +x android/app/src/main/jniLibs/armeabi-v7a/libcloudflared.so
          
          # x86_64
          mkdir -p android/app/src/main/jniLibs/x86_64
          wget -O android/app/src/main/jniLibs/x86_64/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x android/app/src/main/jniLibs/x86_64/libcloudflared.so
          
          # x86 (32-bit)
          mkdir -p android/app/src/main/jniLibs/x86
          wget -O android/app/src/main/jniLibs/x86/libcloudflared.so \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-386
          chmod +x android/app/src/main/jniLibs/x86/libcloudflared.so
          
          # Copy vào assets để fallback (ARM64)
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          chmod +x assets/cloudflared
          
          echo "=== Native libraries ==="
          find android/app/src/main/jniLibs -name "*.so" -exec file {} \;

      # ============================================================
      # CẤU HÌNH ANDROID
      # ============================================================
      - name: Configure Android
        run: |
          cd tunnel_app
          
          # packagingOptions
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          # MainActivity.kt
          mkdir -p android/app/src/main/kotlin/com/yourcompany/tunnel_controller
          cat > android/app/src/main/kotlin/com/yourcompany/tunnel_controller/MainActivity.kt << 'EOF'
          package com.yourcompany.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.yourcompany.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          # AndroidManifest.xml
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.yourcompany.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      # ============================================================
      # BUILD APK (FULL ARCH)
      # ============================================================
      - name: Build APK (full architecture)
        run: |
          cd tunnel_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
