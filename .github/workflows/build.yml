name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ============================================================
      # CÀI ĐẶT QEMU CHO ARM64 (hỗ trợ mô phỏng nếu cần)
      # ============================================================
      - name: Setup QEMU for ARM64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-arm

      # ============================================================
      # CÀI ĐẶT ANDROID NDK
      # ============================================================
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      # ============================================================
      # BUILD CLOUDFLARED CHO TẤT CẢ KIẾN TRÚC ANDROID
      # ============================================================
      - name: Build cloudflared for Android (all architectures)
        run: |
          git clone https://github.com/cloudflare/cloudflared.git --depth=1
          cd cloudflared
          
          # Hàm build cho từng kiến trúc
          build_arch() {
            local GOARCH=$1
            local CC_ARCH=$2
            local CXX_ARCH=$3
            local OUTPUT_DIR=$4
            
            echo "🔨 Building for $GOARCH..."
            export GOOS=android
            export GOARCH=$GOARCH
            export CGO_ENABLED=1
            export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$CC_ARCH"
            export CXX="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$CXX_ARCH"
            
            go build -ldflags="-s -w" -o cloudflared ./cmd/cloudflared
            file cloudflared
            readelf -d cloudflared | grep NEEDED || echo "No dynamic dependencies"
            
            mkdir -p ../output/$OUTPUT_DIR
            cp cloudflared ../output/$OUTPUT_DIR/libcloudflared.so
            chmod +x ../output/$OUTPUT_DIR/libcloudflared.so
          }
          
          # Build cho từng kiến trúc
          build_arch "arm64" "aarch64-linux-android21-clang" "aarch64-linux-android21-clang++" "arm64-v8a"
          build_arch "arm" "armv7a-linux-androideabi21-clang" "armv7a-linux-androideabi21-clang++" "armeabi-v7a"
          build_arch "amd64" "x86_64-linux-android21-clang" "x86_64-linux-android21-clang++" "x86_64"
          build_arch "386" "i686-linux-android21-clang" "i686-linux-android21-clang++" "x86"
          
          echo "✅ Build completed for all architectures."

      # ============================================================
      # TẠO FLUTTER PROJECT
      # ============================================================
      - name: Create Flutter project
        run: |
          flutter create --org com.TGNF --project-name tunnel_controller tunnel_app
          cd tunnel_app
          rm -rf lib pubspec.yaml assets
          cp -r ../lib .
          cp ../pubspec.yaml .
          mkdir -p assets
          flutter pub get

      # ============================================================
      # COPY CLOUDFLARED VÀO JNILIBS (tất cả các arch)
      # ============================================================
      - name: Setup native libraries
        run: |
          cd tunnel_app
          
          # Copy từ output đã build vào đúng thư mục jniLibs
          for arch in arm64-v8a armeabi-v7a x86_64 x86; do
            mkdir -p android/app/src/main/jniLibs/$arch
            cp ../output/$arch/libcloudflared.so android/app/src/main/jniLibs/$arch/
          done
          
          # Copy bản arm64 vào assets làm fallback
          cp android/app/src/main/jniLibs/arm64-v8a/libcloudflared.so assets/cloudflared
          chmod +x assets/cloudflared

      # ============================================================
      # CẤU HÌNH ANDROID
      # ============================================================
      - name: Configure Android
        run: |
          cd tunnel_app
          
          sed -i '/android {/a \    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = true\n        }\n    }' android/app/build.gradle

          mkdir -p android/app/src/main/kotlin/com/TGNF/tunnel_controller
          cat > android/app/src/main/kotlin/com/TGNF/tunnel_controller/MainActivity.kt << 'EOF'
          package com.TGNF.tunnel_controller

          import android.os.Bundle
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.TGNF.tunnel_controller/native"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getNativeLibraryDir") {
                          result.success(applicationInfo.nativeLibraryDir)
                      } else {
                          result.notImplemented()
                      }
                  }
              }
          }
          EOF

          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.TGNF.tunnel_controller">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="Tunnel Controller"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      # ============================================================
      # BUILD APK (hỗ trợ đa kiến trúc)
      # ============================================================
      - name: Build APK (full architecture)
        run: |
          cd tunnel_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-apk
          path: tunnel_app/build/app/outputs/flutter-apk/*.apk
